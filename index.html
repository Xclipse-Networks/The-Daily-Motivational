<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE DAILY MOTIVATIONAL | SOVEREIGN PORTAL</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: 'var(--accent-color)', dark: '#020202', glow: 'var(--glow-color)' },
                    fontFamily: { sans: ['Montserrat', 'sans-serif'], display: ['Syncopate', 'sans-serif'] }
                }
            }
        }
    </script>

    <style>
        :root {
            --accent-color: #f59e0b;
            --glow-color: rgba(245, 158, 11, 0.1);
            --glass-blur: 20px;
            --image-filter: grayscale(0%);
            --text-scale: 1;
            --card-bg: rgba(255, 255, 255, 0.03);
        }

        body { 
            background-color: #020202; color: #ffffff; overflow-x: hidden; 
            font-family: 'Montserrat', sans-serif;
            font-size: calc(1rem * var(--text-scale));
        }

        .high-contrast { --card-bg: rgba(0, 0, 0, 0.95); --glass-blur: 0px; --image-filter: contrast(1.1); }
        .high-contrast .glass-card { border: 1.5px solid var(--accent-color) !important; }

        .grain { position: fixed; inset: 0; pointer-events: none; z-index: 99; opacity: 0.03; background-image: url("https://grainy-gradients.vercel.app/noise.svg"); }
        .mesh-container { position: fixed; inset: 0; z-index: -1; pointer-events: none; }
        .mesh-orb { position: absolute; border-radius: 50%; filter: blur(120px); }
        
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(var(--glass-blur));
            border: 1px solid rgba(255, 255, 255, 0.08);
            transform-style: preserve-3d; perspective: 1000px;
        }

        #settings-panel {
            transform: translateX(100%); transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            background: rgba(5, 5, 5, 0.98); backdrop-filter: blur(40px); border-left: 2px solid var(--accent-color);
        }
        #settings-panel.active { transform: translateX(0); }

        .music-bar { 
            background: rgba(5, 5, 5, 0.85); backdrop-filter: blur(var(--glass-blur)) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 2.5rem; 
            width: calc(100% - 2rem); left: 1rem; bottom: 1rem;
        }

        .text-gradient { 
            background: linear-gradient(135deg, #fff 0%, var(--accent-color) 50%, #000 100%); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
            background-size: 200% auto; animation: textShine 8s ease infinite; 
        }
        @keyframes textShine { to { background-position: 200% center; } }

        input[type='range'] { -webkit-appearance: none; background: rgba(255, 255, 255, 0.1); border-radius: 10px; height: 4px; }
        input[type='range']::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: var(--accent-color); border-radius: 50%; cursor: pointer; }
    </style>
</head>

<body>
    <div id="loader" class="fixed inset-0 z-[3000] bg-[#020202] flex flex-col items-center justify-center transition-opacity duration-1000">
        <div class="relative w-24 h-24">
            <div class="absolute inset-0 border-2 border-primary/20 border-t-primary rounded-full animate-spin"></div>
            <div class="absolute inset-0 flex items-center justify-center animate-pulse">
                <i class="fas fa-bolt text-primary text-xl"></i>
            </div>
        </div>
        <p id="loader-status" class="mt-8 font-display text-[9px] uppercase tracking-[0.5em] text-white/50">Initializing Portal...</p>
    </div>

    <div class="grain"></div>
    <div class="mesh-container">
        <div id="orb-1" class="mesh-orb w-[800px] h-[800px] bg-primary/10 top-[-20%] left-[-10%]"></div>
        <div id="orb-2" class="mesh-orb w-[600px] h-[600px] bg-glow bottom-[-10%] right-[-10%]"></div>
    </div>

    <aside id="settings-panel" class="fixed top-0 right-0 h-full w-80 z-[2000] p-10 flex flex-col gap-8 shadow-2xl">
        <div class="flex justify-between items-center mb-4">
            <h3 class="font-display text-xs font-bold uppercase tracking-widest text-primary">System Config</h3>
            <button onclick="PortalEngine.toggleSettings()"><i class="fas fa-times"></i></button>
        </div>
        <div>
            <label class="text-[9px] uppercase font-black tracking-widest opacity-40 mb-4 block">Text Scaling</label>
            <div class="grid grid-cols-3 gap-2">
                <button onclick="PortalEngine.updateSetting('text', '0.9')" class="bg-white/5 py-2 rounded text-[10px]">Small</button>
                <button onclick="PortalEngine.updateSetting('text', '1.1')" class="bg-white/5 py-2 rounded text-[10px] border border-primary/30">Normal</button>
                <button onclick="PortalEngine.updateSetting('text', '1.3')" class="bg-white/5 py-2 rounded text-[10px]">Large</button>
            </div>
        </div>
        <div>
            <label class="text-[9px] uppercase font-black tracking-widest opacity-40 mb-4 block">Visual Mode</label>
            <select onchange="PortalEngine.updateSetting('mode', this.value)" class="w-full bg-white/5 border border-white/10 rounded-lg p-3 text-[10px] uppercase font-bold text-white outline-none">
                <option value="default">Vivid (Color)</option>
                <option value="noir">Soft Noir (B&W)</option>
                <option value="high-contrast">High Contrast</option>
            </select>
        </div>
        <div>
            <label class="text-[9px] uppercase font-black tracking-widest opacity-40 mb-4 block">Accent Core</label>
            <div class="flex gap-4">
                <div onclick="PortalEngine.updateSetting('accent', '#f59e0b')" class="w-8 h-8 rounded-full bg-[#f59e0b] cursor-pointer"></div>
                <div onclick="PortalEngine.updateSetting('accent', '#ef4444')" class="w-8 h-8 rounded-full bg-[#ef4444] cursor-pointer"></div>
                <div onclick="PortalEngine.updateSetting('accent', '#ffffff')" class="w-8 h-8 rounded-full bg-[#ffffff] cursor-pointer"></div>
            </div>
        </div>
        <button onclick="PortalEngine.resetSettings()" class="mt-auto py-4 border border-white/10 rounded-xl text-[9px] uppercase font-black tracking-widest opacity-40 hover:opacity-100 transition">Restore Factory</button>
    </aside>

    <header class="fixed top-0 w-full z-[100] px-8 py-8 md:px-20 flex justify-between items-center transition-all duration-500" id="navbar">
        <a href="#home" class="font-display text-xl font-bold tracking-tighter uppercase italic">THE DAILY <span class="text-primary">MOTIVATIONAL</span></a>
        <div class="flex items-center gap-8">
            <nav class="hidden lg:flex items-center gap-8 font-bold text-[9px] uppercase tracking-[0.4em]">
                <a href="#home" class="hover:text-primary transition-colors">Home</a>
                <a href="Episodes.html" class="hover:text-primary transition-colors">Library</a>
            </nav>
            <button onclick="PortalEngine.toggleSettings()" class="magnetic w-10 h-10 rounded-full bg-white/5 border border-white/10 flex items-center justify-center hover:bg-primary transition-all duration-300">
                <i class="fas fa-cog text-xs"></i>
            </button>
        </div>
    </header>

    <main>
        <section id="home" class="min-h-screen flex flex-col items-center justify-center text-center px-6">
            <div data-aos="zoom-out" data-aos-duration="1200">
                <div class="mb-12 relative inline-block group">
                    <div class="absolute inset-0 bg-primary/20 blur-[120px] rounded-full group-hover:bg-primary/40 transition-all duration-700"></div>
                    <img id="hero-art" src="logo.png" class="relative w-64 h-64 md:w-[480px] md:h-[480px] object-cover rounded-[3.5rem] shadow-2xl podcast-art border border-white/5 group-hover:scale-105 transition-transform duration-700">
                </div>
                <h1 class="text-gradient text-4xl md:text-[7.5rem] font-black italic tracking-tighter uppercase leading-[0.8] mb-12">THE DAILY<br>MOTIVATIONAL</h1>
                <a href="Episodes.html" class="magnetic inline-block bg-white text-dark font-black text-[11px] py-6 px-16 rounded-full hover:bg-primary hover:text-white transition-all uppercase shadow-2xl tracking-[0.2em]">Enter Archive</a>
            </div>
        </section>

        <section id="episodes" class="py-40 px-8 md:px-20">
            <div class="max-w-7xl mx-auto">
                <h2 class="font-display text-4xl md:text-6xl font-black italic uppercase mb-24 border-b border-white/5 pb-16">Live Pipeline</h2>
                <div id="rss-container" class="grid grid-cols-1 md:grid-cols-3 gap-12"></div>
            </div>
        </section>

        <section id="platforms" class="py-40 bg-[#050505]">
            <div class="max-w-6xl mx-auto px-8">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <a href="https://open.spotify.com/show/2fL52aIz9KqNco9sRTCfqr" target="_blank" class="tilt-card glass-card group p-16 rounded-[4rem] text-center transition-all hover:-translate-y-2">
                        <i class="fab fa-spotify text-primary text-6xl mb-8 group-hover:scale-110 transition-transform"></i>
                        <h3 class="font-display text-4xl font-black italic uppercase">Spotify</h3>
                        <p class="text-[10px] uppercase font-bold tracking-[0.5em] opacity-40 mt-4">Direct Stream Available</p>
                    </a>
                    <a href="https://podcasts.apple.com/us/channel/the-daily-motivational/id6754624235" target="_blank" class="tilt-card glass-card group p-16 rounded-[4rem] text-center transition-all hover:-translate-y-2">
                        <i class="fab fa-apple text-white text-6xl mb-8 group-hover:scale-110 transition-transform"></i>
                        <h3 class="font-display text-4xl font-black italic uppercase">Apple</h3>
                        <p class="text-[10px] uppercase font-bold tracking-[0.5em] opacity-40 mt-4">Lossless Audio Stream</p>
                    </a>
                </div>
            </div>
        </section>
    </main>

    <div class="music-bar fixed z-[1000] px-8 py-5 flex flex-col md:flex-row items-center justify-between gap-6 shadow-2xl">
        <div class="flex items-center gap-5 w-full md:w-1/3">
            <img id="player-art" src="logo.png" class="w-14 h-14 rounded-2xl object-cover podcast-art border border-white/10">
            <div class="min-w-0">
                <p id="player-title" class="text-[10px] font-extrabold truncate uppercase italic text-white tracking-widest">Select Episode</p>
                <div class="flex items-center gap-2">
                    <span class="w-1.5 h-1.5 bg-primary rounded-full animate-pulse"></span>
                    <p class="text-[8px] text-white/40 font-black uppercase tracking-[0.4em]">Frequency Online</p>
                </div>
            </div>
        </div>
        <div class="flex flex-col items-center gap-2 w-full md:w-1/3">
            <button id="play-btn" class="magnetic w-12 h-12 rounded-full bg-white text-dark flex items-center justify-center hover:bg-primary transition-all"><i class="fas fa-play text-xs ml-0.5"></i></button>
            <div class="flex items-center gap-4 w-full px-4">
                <span id="current-time" class="text-[8px] font-mono opacity-30">0:00</span>
                <input type="range" id="progress-slider" value="0" min="0" max="100" class="flex-1">
                <span id="duration-time" class="text-[8px] font-mono opacity-30">0:00</span>
            </div>
        </div>
        <div class="hidden md:flex justify-end items-center gap-4 w-1/3">
            <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.8" class="w-20">
        </div>
    </div>

    <audio id="main-audio"></audio>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="portal-engine.js"></script>
</body>
</html>
